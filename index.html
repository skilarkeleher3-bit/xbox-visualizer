<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon360 - Web Music Visualizer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }
        #visualizer-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-container {
            position: absolute;
            z-index: 10;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(15, 15, 15, 0.85);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #10b981; /* Xbox Neon Green */
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            transition: opacity 0.5s ease;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            color: #a3a3a3;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            width: 250px;
            padding: 12px;
            margin: 10px auto;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-spotify { background-color: #1DB954; color: white; }
        .btn-soundcloud { background-color: #FF5500; color: white; }
        .btn-device { background-color: #3b82f6; color: white; }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <!-- The graphics layer where the Xbox visualizer draws -->
    <canvas id="visualizer-canvas"></canvas>

    <!-- The user selection dashboard -->
    <div id="ui-container">
        <h1>Neon 360</h1>
        <p>Select your audio source to begin the visualization</p>
        
        <button class="btn btn-spotify" onclick="connectSpotify()">Connect Spotify</button>
        <button class="btn btn-soundcloud" onclick="connectSoundCloud()">Link SoundCloud</button>
        <button class="btn btn-device" onclick="connectDeviceAudio()">Use Device Audio / Mic</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
